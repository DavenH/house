type: intent_plan
plan: ridgestone-intent-studio-wing
unit: ft
scale: 16
notes:
  - 'Principal Ridgestone candidate: studio/library/piano wing.'
  - 'Promotes the left L-shaped wing into a semi-public library + office + piano + music studio suite, matching the driveway-facing privacy gradient.'
  - 'The piano now sits inside the library wing for recording and office/studio overlap; the hearth shifts to the stair/great-room threshold as a central masonry anchor.'
  - 'The former lower-left storage pocket is absorbed into the library/piano room for credible circulation; bulk storage is concentrated on the tower/service side.'
  - 'Pattern basis: Library, Music Practice Rooms, Alcoves, Half-Open Wall, Intimacy Gradient, and Light on Two Sides of Every Room.'
  - 'Upper-floor improvement: master bedroom claims the west upper bay for a real exterior window; hall becomes a windowed laundry/linen room close to the master suite.'
