type: intent_plan
plan: ridgestone-intent-upper-alt
unit: ft
scale: 16
notes:
  - "Alternate second-storey layout study."
  - "L1 remains close to ridgestone-intent; L2 uses stricter mass coverage and access validation."
datums:
  x:
    west: 0
    storage_e: 6
    left_w: 6
    closet_w: 14
    left_e: 21
    stair_e: 30
    tower_e: 38
    right_w: 38
    pantry_w: 42.5
    room_split: 43.5
    pantry_e: 46.5
    dining_w: 51
    right_e: 57
    dining_e: 65
  y:
    gable_n: 2
    main_n: 7
    ensuite_s: 11
    bath_s: 15
    stair_s: 18
    public_split: 22
    lower_storage_n: 24
    entry_s: 28
    tower_s: 30
    gable_s: 32
    main_s: 35
catalog:
  piano_5x7: {size: [7, 5], label: PIANO, clearance: {around: 1}}
  dining_table_3x7: {size: [7, 3], label: TABLE, clearance: {around: 2.5}}
  couch_7x3: {size: [7, 3], label: COUCH, clearance: {around: 1.5}}
  chair_3x3: {size: [3, 3], label: CHAIR, clearance: {around: 1.5}}
  queen_bed: {size: [6.67, 5], label: BED, clearance: {left: 0, right: 1, top: 1, foot: 2}}
  pool_table_4x8: {size: [8, 4], label: POOL TABLE, clearance: {walls: 5}}
  counter: {label: COUNTER}
masses:
  shared_body:
    levels: [L1, L2]
    rects:
      - {x: [west, left_e], y: [main_n, entry_s]}
      - {x: [left_w, left_e], y: [gable_n, bath_s]}
      - {x: [left_w, left_e], y: [public_split, gable_s]}
      - {x: [left_e, right_e], y: [main_n, entry_s]}
      - {x: [right_w, right_e], y: [entry_s, main_s]}
      - {x: [stair_e, tower_e], y: [public_split, tower_s]}
  dining_extrusion:
    level: L1
    rect: {x: [right_e, dining_e], y: [bath_s, entry_s]}
levels:
  L1:
    title: First Floor
    derive_partitions: true
    spaces:
      laundry: {x: [west, storage_e], y: [main_n, bath_s], privacy: service}
      bathroom: {x: [left_w, left_e], y: [gable_n, bath_s], privacy: private}
      library: {x: [west, left_e], y: [bath_s, public_split], privacy: semi_private}
      storage: {x: [west, storage_e], y: [public_split, entry_s], privacy: service}
      office_studio: {x: [left_w, left_e], y: [public_split, gable_s], label: OFFICE/STUDIO, privacy: semi_private}
      stair: {x: [left_e, stair_e], y: [main_n, stair_s], privacy: circulation}
      entrance: {x: [left_e, stair_e], y: [stair_s, entry_s], privacy: circulation}
      tower_closet: {x: [stair_e, tower_e], y: [public_split, tower_s], label: CLOSET, privacy: service}
      piano: {rect: [29, 7, 9, 11], label: false, privacy: public}
      great_room: {x: [right_w, right_e], y: [main_n, public_split], label: GREAT ROOM, privacy: public}
      kitchen: {x: [right_w, right_e], y: [public_split, main_s], privacy: public}
      pantry: {x: [pantry_w, pantry_e], y: [stair_s, public_split], privacy: service, label_size: 11}
      dining: {x: [dining_w, dining_e], y: [bath_s, entry_s], label: DINING AREA, privacy: public}
    features:
      piano: {kind: piano_5x7, within: piano, at: [33.5, 12]}
      hearth: {at: [49, 20], size: [5, 4], label: HEARTH}
      great_room_couch: {kind: couch_7x3, within: great_room, at: [48, 11.5]}
      great_room_chair_w: {kind: chair_3x3, within: great_room, at: [42.5, 14.5]}
      great_room_chair_e: {kind: chair_3x3, within: great_room, at: [53, 14.5]}
      kitchen_south_counter:
        kind: counter
        along: {space: kitchen, side: south}
        depth: 1.5
      kitchen_east_counter:
        kind: counter
        along: {space: kitchen, side: east}
        depth: 1.5
      kitchen_island:
        size: [7, 3]
        at: [45.5, 29.5]
        label: ISLAND
        clearance: {walls: 4}
      dining_table: {kind: dining_table_3x7, within: dining, at: [58.5, 21.5]}
    connections:
      - {between: [laundry, bathroom], width: 3}
      - {between: [bathroom, library], width: 3}
      - {between: [library, office_studio], kind: open}
      - {between: [stair, entrance], width: 3}
      - {between: [entrance, tower_closet], width: 3}
      - {between: [piano, great_room], kind: open}
      - {between: [great_room, kitchen], kind: open}
      - {between: [kitchen, pantry], width: 3}
    access:
      - [entrance, stair]
      - [entrance, tower_closet]
      - [entrance, kitchen]
      - [kitchen, dining]
      - [kitchen, great_room]
      - [kitchen, pantry]
    openings:
      - {id: front_door, space: entrance, side: south, width: 5, kind: door, swing: in-left}
      - {id: bath_window, space: bathroom, side: north, width: 5, kind: window}
      - {id: library_window, space: library, side: west, width: 3, kind: window}
      - {id: great_room_window, space: great_room, side: north, width: 8, kind: window}
      - {id: kitchen_window, space: kitchen, side: south, width: 8, kind: window}
      - {id: office_window, space: office_studio, side: south, width: 7, kind: window}
      - {id: dining_window, space: dining, side: east, width: 5, kind: window}
  L2:
    title: Second Floor - Alternate
    derive_partitions: true
    auto_windows: {window_sides: 2, width: 8, min_width: 3}
    validate: {cover_masses: true, closed_space_access: true}
    spaces:
      upper_storage: {x: [west, storage_e], y: [main_n, ensuite_s], label: STORAGE, label_size: 9, privacy: service}
      lower_storage: {x: [west, storage_e], y: [lower_storage_n, entry_s], label: STORAGE, label_size: 9, privacy: service}
      ensuite_bathroom: {x: [left_w, left_e], y: [gable_n, ensuite_s], label: ENSUITE/BATHROOM, privacy: private}
      master_bedroom: {x: [west, closet_w], y: [ensuite_s, lower_storage_n], label: MASTER/BEDROOM, label_at: [9.5, 21], privacy: private}
      walk_in_closet: {x: [closet_w, left_e], y: [ensuite_s, stair_s], label: WALK-IN/CLOSET, privacy: private}
      suite_foyer: {x: [closet_w, left_e], y: [stair_s, lower_storage_n], label: FOYER, label_size: 12, privacy: circulation}
      gym: {x: [left_w, left_e], y: [lower_storage_n, gable_s], privacy: semi_private}
      stair: {x: [left_e, stair_e], y: [main_n, stair_s], privacy: circulation}
      upper_hall: {x: [left_e, stair_e], y: [stair_s, entry_s], label: HALL, privacy: circulation}
      east_landing: {x: [stair_e, tower_e], y: [stair_s, public_split], label: false, privacy: circulation}
      tower: {x: [stair_e, tower_e], y: [public_split, tower_s], privacy: circulation}
      room_1: {x: [stair_e, room_split], y: [main_n, stair_s], label: ROOM 1, privacy: private}
      room_2: {x: [room_split, right_e], y: [main_n, stair_s], label: ROOM 2, privacy: private}
      lounge: {x: [right_w, right_e], y: [stair_s, main_s], privacy: public}
    features:
      hearth:
        kind: chimney
        at: [49, 18.75]
        size: [4, 1.5]
        label: CHIMNEY
        avoid_openings: true
      queen_bed:
        kind: queen_bed
        within: master_bedroom
        at: [9.335, 17]
        avoid_openings: true
      pool_table: {kind: pool_table_4x8, at: [48, 28]}
    connections:
      - {between: [upper_storage, master_bedroom], width: 2.5}
      - {between: [lower_storage, master_bedroom], width: 2.5}
      - {between: [ensuite_bathroom, master_bedroom], width: 3.5}
      - {between: [master_bedroom, walk_in_closet], width: 3}
      - {between: [master_bedroom, suite_foyer], width: 3}
      - {between: [walk_in_closet, suite_foyer], width: 3}
      - {between: [master_bedroom, gym], width: 3}
      - {between: [suite_foyer, gym], width: 3}
      - {between: [suite_foyer, upper_hall], kind: open}
      - {between: [stair, upper_hall], kind: open}
      - {between: [upper_hall, east_landing], kind: open}
      - {between: [east_landing, tower], kind: open}
      - {between: [upper_hall, tower], width: 3, position: south}
      - {between: [east_landing, room_1], width: 3}
      - {between: [east_landing, lounge], kind: open}
      - {between: [room_2, lounge], width: 3, position: east, swing: in-left}
    access:
      - [stair, upper_hall]
      - [upper_hall, east_landing]
      - [upper_hall, suite_foyer]
      - [upper_hall, tower]
      - [east_landing, tower]
      - [east_landing, room_1]
      - [east_landing, lounge]
      - [lounge, room_2]
      - [suite_foyer, master_bedroom]
      - [master_bedroom, ensuite_bathroom]
      - [master_bedroom, walk_in_closet]
      - [master_bedroom, gym]
      - [master_bedroom, upper_storage]
      - [master_bedroom, lower_storage]
      - [suite_foyer, walk_in_closet]
      - [suite_foyer, gym]
    openings:
      - {id: ensuite_window, space: ensuite_bathroom, side: north, width: 5, kind: window}
      - {id: room_1_window, space: room_1, side: north, width: 5, kind: window}
      - {id: room_2_window, space: room_2, side: north, width: 5, kind: window}
      - {id: lounge_window, space: lounge, side: south, width: 10, kind: window}
      - {id: gym_window, space: gym, side: south, width: 7, kind: window}
stacks:
  - id: tower_stack
    members: [L1.tower_closet, L2.tower]
    same: [x, y, w, h]
  - id: stair_stack
    members: [L1.stair, L2.stair]
    same: [x, y, w, h]
  - id: hearth_stack
    members: [L1.hearth, L2.hearth]
    same: [cx]
alignments:
  - id: left_front_gable
    members: [L1.bathroom, L2.ensuite_bathroom]
    same: [x, w]
  - id: left_back_gable
    members: [L1.office_studio, L2.gym]
    same: [x, w]
  - id: right_gable_width
    members: [L1.kitchen, L2.lounge]
    same: [x, w]
